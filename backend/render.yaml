# pharmaLocator Backend — Render Deployment Config
# https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: pharmalocator-api
    runtime: node
    region: oregon           # or frankfurt if your users are in Africa/Europe
    plan: free               # upgrade to starter ($7/mo) for no spin-down
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000           # Render assigns $PORT automatically; this is the default
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 300

      # ── Set these in Render Dashboard → Environment (never commit real values) ──
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SENTRY_DSN
        sync: false
